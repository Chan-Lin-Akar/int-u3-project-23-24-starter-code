<!DOCTYPE html>
<html>
    <head>
        <title>Unit 3 Project Starter Code</title>
    </head>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    
    <body>
        <!-- Add a title and edit the opening of your story. -->
        <div class="title"> Welcome to Space Explorer </div>
        <div class="story-opening">
            <img src="https://omgsymbol.com/download/space/style-1/06/original/logo.jpg">
            <h1>Choose following option to explore.</h1>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>

        <!-- Change the text of the buttons to the options relevant to your story. -->
        <div class="buttons-home">
            <button class="option-one">Earth</button>
            <button class="option-two">Solar System</button>
        </div>

        <!-- Put the part of the story the user will see if they picked option one. -->
        <div class="option-one-screen">
            <h1>What gas is the most abandon gas on the earth? </h1>
            <button class="oxygen">
                <img src="https://tse2.mm.bing.net/th/id/OIP.tsaxNBORSJ_Ad1UWvfsZ4wHaDQ?pid=Api&h=220&P=0">
            </button>
            <button class="carbon">
                <img src="https://tse3.mm.bing.net/th/id/OIP.nHoybNe-r9FKu-5sfDsLyAHaH6?pid=Api&h=220&P=0">
            </button>
            <button class="nitrogen">
                <img src="https://tse4.mm.bing.net/th/id/OIP.DVJxEs-9oDRB5ViyXQjoFAHaH5?pid=Api&h=220&P=0">
            </button>
            <button class="hydrogen">
                <img src="https://tse1.mm.bing.net/th/id/OIP.pc5PRlydmJHX-EtNHAb4SgHaEK?pid=Api&h=220&P=0">
            </button>
        </div>

        <!-- Put the part of the story the user will see if they picked option two. -->
        <div class="option-two-screen">
            <h1>Find the Neptune</h1>
            <button class="earth">
                <img src="https://removebackground.app/original_images/f146d40f00cc5382d03147253195fa38.png?1781480773949" alt="earth">
            </button>
            <button class="mercury">
                <img src="https://tse4.mm.bing.net/th/id/OIP.tO7xSXRD269febu2ozeyYAHaHa?pid=Api&h=220&P=0">
            </button>
            <button class="venus">
                <img src="https://tse4.mm.bing.net/th/id/OIP.Roej3ht3n1k7eQOEzdavTAHaFo?pid=Api&h=220&P=0">
            </button>
            <button class="saturn">
                <img src="https://tse1.mm.bing.net/th/id/OIP.vKKQkKeFUSIl1-N3nKk1bQHaFG?pid=Api&h=220&P=0">
            </button>
            <button class="mars">
                <img src="https://tse2.mm.bing.net/th/id/OIP.UqTPX9nJNN0h8xsvnbCO0gHaE8?pid=Api&h=220&P=0">
            </button>
            <button class="neptnue">
                <img src="https://planetfacts.org/wp-content/uploads/2010/03/Neptune.jpg">
            </button>
            <button class="jupiter">
                <img src="https://tse2.mm.bing.net/th/id/OIP.n9Ng8RJQNqpIirbsPasN7AHaHa?pid=Api&h=220&P=0">
            </button>
            <button class="uranus">
                <img src="https://tse3.mm.bing.net/th/id/OIP.kg_Ml8fNfRlBDljA6pwitwHaHa?pid=Api&h=220&P=0">
            </button>
            
        </div>

        <!--Put the end of the story if the user chose option 1.-->
        <div class="option-one-end">
            <h1>Congradulation </h1>
            <p>You are correct!</p>
            <img src="https://gifdb.com/images/high/well-done-congratulations-440-x-302-gif-yqe8wmfl5qkfyyqw.gif">
            <button class="startAgain">Start Again </button>

        <!-- Put the end of the story if the user chose option 2.-->
        <div class="option-two-end">
            <h1>Congradulation </h1>
            <p>You have found the naptnue!</p>
            <img src="https://gifdb.com/images/high/well-done-congratulations-440-x-302-gif-yqe8wmfl5qkfyyqw.gif">
            <button class="startAgain2">Start Again </button>
        </div>
    </body>
</html>
